<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Maze School</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:url("bg-sekolah.jpg") no-repeat center/cover;
color:white;
text-align:center;
}

/* OVERLAY FULL FIX */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(5px);
z-index:0;
}

/* CONTENT */
.content{
position:relative;
z-index:1;
}

/* LOGO */
.logo{
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
}
.logo img{ width:60px; }

h2{
font-family:Orbitron;
color:#38bdf8;
text-shadow:0 0 10px #38bdf8;
}

/* START SCREEN */
.start{
margin-top:100px;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 15px;
border-radius:10px;
border:none;
background:#38bdf8;
cursor:pointer;
}

/* GAME UI */
.info{
margin:10px auto;
padding:10px 20px;
border-radius:20px;
border:2px solid #38bdf8;
box-shadow:0 0 10px #38bdf8;
font-family:Orbitron;
display:inline-block;
}

.canvas-box{
display:inline-block;
padding:10px;
border-radius:20px;
border:4px solid #38bdf8;
box-shadow:0 0 20px #38bdf8;
}

canvas{
background:#1e293b;
border-radius:10px;
}

.controls{ margin-top:15px; }

.btn{
padding:15px;
margin:5px;
border-radius:15px;
border:2px solid #38bdf8;
background:transparent;
color:#38bdf8;
}

/* LEADERBOARD */
.leaderboard{
background:#1e293b;
margin:15px auto;
padding:10px;
border-radius:10px;
max-width:300px;
display:none;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">

<!-- START SCREEN -->
<div id="startScreen" class="start">
<div class="logo">
<img src="logo-sekolah.png">
<img src="logo-mpk.png">
<img src="logo-osis.png">
</div>

<h2>CAT MAZE SCHOOL</h2>

<input id="playerName" placeholder="Masukkan Nama">
<br><br>
<button onclick="startGame()">START GAME</button>
</div>

<!-- GAME -->
<div id="gameScreen" style="display:none;">

<div class="logo">
<img src="logo-sekolah.png">
<img src="logo-mpk.png">
<img src="logo-osis.png">
</div>

<h2>CAT MAZE SCHOOL</h2>

<div>
<button onclick="toggleLeaderboard()">🏆 Leaderboard</button>
</div>

<div class="info">
LEVEL <span id="levelText">1</span> |
⏱ <span id="timerText">00:00</span>
</div>

<br>

<div class="canvas-box">
<canvas id="maze" width="350" height="325"></canvas>
</div>

<div class="controls">
<button class="btn" onclick="move(0,-1)">▲</button><br>
<button class="btn" onclick="move(-1,0)">◀</button>
<button class="btn" onclick="move(0,1)">▼</button>
<button class="btn" onclick="move(1,0)">▶</button>
</div>

<div class="leaderboard" id="leaderboardBox">
<h3>Leaderboard</h3>
<div id="leaderboardList"></div>
</div>

</div>

</div>

const goals=levels.map(l=>({x:l[0].length-2,y:l.length-2}));

function startGame(){
document.getElementById("startScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";
startTimer();
draw();
}

function formatTime(s){
let m=Math.floor(s/60);
let ss=s%60;
return (m<10?"0"+m:m)+":"+(ss<10?"0"+ss:ss);
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
seconds++;
document.getElementById("timerText").innerText=formatTime(seconds);
},1000);
}

function draw(){
ctx.clearRect(0,0,350,325);
let maze=levels[level];

for(let y=0;y<maze.length;y++){
for(let x=0;x<maze[y].length;x++){
ctx.fillStyle = maze[y][x]==0 ? "#0f172a" : "#e5e7eb";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
}

let g=goals[level];
ctx.fillStyle="green";
ctx.fillRect(g.x*tile,g.y*tile,tile,tile);

if(cat.complete){
ctx.drawImage(cat, player.x*tile-5, player.y*tile-5, 35, 35);
}
}

function move(dx,dy){
let maze=levels[level];
let nx=player.x+dx;
let ny=player.y+dy;

if(maze[ny] && maze[ny][nx]==1){
player.x=nx;
player.y=ny;
}

let g=goals[level];

if(player.x==g.x && player.y==g.y){
clearInterval(timer);

let name=document.getElementById("playerName").value||"Player";
saveScore(name,seconds);

alert("🎉 CONGRATS!\nTime: "+formatTime(seconds));

location.reload();
}

draw();
}

function toggleLeaderboard(){
let box=document.getElementById("leaderboardBox");
box.style.display = box.style.display=="none"?"block":"none";
renderLeaderboard();
}

function saveScore(name,time){
let data=JSON.parse(localStorage.getItem("mazeScore"))||[];
data.push({name,time});
data.sort((a,b)=>a.time-b.time);
data=data.slice(0,10);
localStorage.setItem("mazeScore",JSON.stringify(data));
}

function renderLeaderboard(){
let data=JSON.parse(localStorage.getItem("mazeScore"))||[];
let list=document.getElementById("leaderboardList");
list.innerHTML="";
data.forEach((d,i)=>{
list.innerHTML+=`<div>#${i+1} ${d.name} - ${formatTime(d.time)}</div>`;
});
}
</script>

</body>
</html>
