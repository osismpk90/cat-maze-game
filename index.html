<html lang="id">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Maze School</title>

body {
    margin:0;

    border-radius:12px;

.controls { margin:10px; }
.btn { padding:10px; margin:5px; font-size:18px; }

.leaderboard {
    background:#1e293b;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
    max-width:300px;

}

.record-item {

}

.logo {
    width:60px;

    display:flex;

<div class="header">
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/194/194279.png">
<h2>CAT MAZE SCHOOL</h2>
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/194/194279.png">
</div>

<input id="playerName" placeholder="Masukkan Nama">
<button onclick="toggleLeaderboard()">👤</button>

<br>

<canvas id="maze" width="350" height="325"></canvas>

<button class="btn" onclick="move(0,-1)">⬆</button><br>

<button class="btn" onclick="move(0,1)">⬇</button>
<button class="btn" onclick="move(1,0)">➡</button>
</div>

<div class="leaderboard" id="leaderboardBox">
<h3>🏆 Leaderboard</h3>
<div id="leaderboardList"></div>
</div>

const goals = levels.map(lvl => ({
    x: lvl[0].length - 2,
    y: lvl.length - 2
}));

const cat = new Image();
cat.src = "https://i.imgur.com/4AiXzf8.png";

function draw(){
ctx.clearRect(0,0,350,325);

let maze = levels[level];

for(let y=0;y<maze.length;y++){
for(let x=0;x<maze[y].length;x++){

if(maze[y][x]==0){
ctx.fillStyle="#1e293b";
}else{
ctx.fillStyle="#fff";
}

ctx.fillRect(x*tile,y*tile,tile,tile);
}
}

let g = goals[level];
ctx.fillStyle="lime";
ctx.fillRect(g.x*tile,g.y*tile,tile,tile);

/* KUCING */
if(cat.complete){
let size = tile*1.5;
let offset = (size-tile)/2;
ctx.drawImage(cat,(player.x*tile)-offset,(player.y*tile)-offset,size,size);
}else{
ctx.fillStyle="orange";
ctx.fillRect(player.x*tile,player.y*tile,tile,tile);
}
}

function move(dx,dy){
let maze = levels[level];
let nx = player.x+dx;
let ny = player.y+dy;

if(maze[ny] && maze[ny][nx]==1){
player.x=nx;
player.y=ny;
}

let g = goals[level];

if(player.x==g.x && player.y==g.y){

if(level < levels.length-1){
level++;
player={x:1,y:1};
alert("Level Selesai!");
}else{
alert("🎉 Tamat!");
}
}

draw();
}

window.addEventListener("keydown",e=>{
if(e.key=="ArrowUp")move(0,-1);
if(e.key=="ArrowDown")move(0,1);
if(e.key=="ArrowLeft")move(-1,0);
if(e.key=="ArrowRight")move(1,0);
});

draw();
