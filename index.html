<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Maze School - Leaderboard Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), 
                        url("bg-sekolah.jpg") no-repeat center center/cover;
            z-index: -1;
        }

        .header { width: 100%; padding: 10px; text-align: center; }
        .logos { display: flex; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .logos img { width: 40px; height: 40px; object-fit: contain; }

        h2 {
            font-family: 'Orbitron';
            color: #38bdf8;
            font-size: 1.1rem;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .status-panel {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #334155;
            padding: 5px 15px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }

        #timerText { color: #fbbf24; font-family: 'Orbitron'; font-weight: bold; }
        #levelText { color: #38bdf8; font-weight: 600; }

        .game-container {
            position: relative;
            width: 95%;
            max-width: 350px;
        }

        canvas {
            background: #f8fafc;
            border: 4px solid #38bdf8;
            border-radius: 12px;
            display: block;
            width: 100%;
            height: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .controls {
            margin: 15px 0;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left down right";
            gap: 8px;
        }

        .btn-ctrl {
            width: 60px;
            height: 60px;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid #38bdf8;
            border-radius: 15px;
            color: #38bdf8;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .btn-ctrl:active {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(0.9);
        }

        .up { grid-area: up; }
        .down { grid-area: down; }
        .left { grid-area: left; }
        .right { grid-area: right; }

        /* LEADERBOARD STYLE */
        .leaderboard {
            margin-top: 10px;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #38bdf8;
            border-radius: 12px;
            padding: 10px;
            width: 95%;
            max-width: 350px;
            text-align: center;
            margin-bottom: 20px;
        }

        .record-item {
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            padding: 4px 10px;
            border-bottom: 1px solid #334155;
        }

        .highlight-rank {
            color: #fbbf24;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="header">
    <div class="logos">
        <img src="logo-sekolah.png" alt="Logo Sekolah">
        <img src="logo-mpk.png" alt="Logo MPK">
        <img src="logo-osis.png" alt="Logo OSIS">
    </div>
    <h2>CAT MAZE SCHOOL</h2>
</div>

<div class="status-panel">
    <div id="levelText">LEVEL 1</div>
    <div id="timerText">00:00</div>
</div>

<div class="game-container">
    <canvas id="maze" width="350" height="325"></canvas>
</div>

<div class="controls">
    <div class="btn-ctrl up" onclick="move(0,-1)">▲</div>
    <div class="btn-ctrl left" onclick="move(-1,0)">◀</div>
    <div class="btn-ctrl down" onclick="move(0,1)">▼</div>
    <div class="btn-ctrl right" onclick="move(1,0)">▶</div>
</div>

<div class="leaderboard">
    <div style="font-family: 'Orbitron'; font-size: 0.8rem; margin-bottom: 5px; color: #38bdf8;">🏆 GLOBAL RECORDS</div>
    <div class="record-item" style="color: #22c55e;">
        <span>Personal Best:</span> <span id="pbTime">--:--</span>
    </div>
    <div class="record-item">
        <span>Global Rank:</span> <span id="rankText" class="highlight-rank">Belum Ada Rekor</span>
    </div>
    <div style="font-size: 0.65rem; color: #94a3b8; margin-top: 5px;" id="playerCount">
        Simulasi: 50 Pemain Aktif
    </div>
</div>

const goals = Array(10).fill({ x: 12, y: 11 });

// FUNGSI BARU: FORMAT WAKTU
function formatTime(totalSeconds) {
    let mins = Math.floor(totalSeconds / 60);
    let secs = totalSeconds % 60;
    return (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
}

// FUNGSI BARU: UPDATE LEADERBOARD
function updateLeaderboard() {
    const pb = localStorage.getItem("catMazePB");
    if (pb) {
        document.getElementById("pbTime").innerText = formatTime(parseInt(pb));
        
        // Simulasi Rank Logic: Semakin kecil waktu, semakin tinggi rank
        // Kita asumsikan pemain terbaik dapat 100 detik, terburuk 500 detik.
        let calculatedRank = Math.max(1, Math.floor((parseInt(pb) - 50) / 10)); 
        if (calculatedRank > totalPlayers) calculatedRank = totalPlayers - 1;
        
        document.getElementById("rankText").innerText = "Posisi #" + calculatedRank + " dari " + totalPlayers;
    } else {
        document.getElementById("rankText").innerText = "Belum Ada Skor";
    }
}

function startStopwatch() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        seconds++;
        updateTimerDisplay();
    }, 1000);
}

function updateTimerDisplay() {
    document.getElementById("timerText").innerText = formatTime(seconds);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let maze = levels[level] || levels[0];
    for (let y = 0; y < maze.length; y++) {
        for (let x = 0; x < maze[y].length; x++) {
            if (maze[y][x] === 0) {
                ctx.fillStyle = "#1e293b";
                ctx.fillRect(x * tile, y * tile, tile, tile);
            } else {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(x * tile, y * tile, tile, tile);
                ctx.strokeStyle = "#f1f5f9";
                ctx.strokeRect(x * tile, y * tile, tile, tile);
            }
        }
    }
    
    let goal = goals[level];
    ctx.fillStyle = "#22c55e";
    ctx.fillRect(goal.x * tile, goal.y * tile, tile, tile);

    let catSize = tile * 1.5; 
    let offset = (catSize - tile) / 2;
    ctx.drawImage(cat, (player.x * tile) - offset, (player.y * tile) - offset, catSize, catSize);
}

function move(dx, dy) {
    let maze = levels[level] || levels[0];
    let nx = player.x + dx;
    let ny = player.y + dy;
    
    if (maze[ny] && maze[ny][nx] === 1) {
        player.x = nx;
        player.y = ny;
    }
    
    let goal = goals[level];
    if (player.x === goal.x && player.y === goal.y) {
        if (level < levels.length - 1) {
            level++;
            alert("Level Selesai!");
            player = { x: 1, y: 1 };
            document.getElementById("levelText").innerText = "LEVEL " + (level + 1);
        } else {
            // FINISH SEMUA LEVEL
            clearInterval(timerInterval);
            
            // Simpan Rekor Tercepat
            const lastPB = localStorage.getItem("catMazePB");
            if (!lastPB || seconds < parseInt(lastPB)) {
                localStorage.setItem("catMazePB", seconds);
                alert("🎉 REKOR BARU! Waktu total: " + formatTime(seconds));
            } else {
                alert("🏆 MASTER MAZE! Waktu: " + formatTime(seconds));
            }
            
            // Tambah pemain simulasi biar kelihatan ramai
            totalPlayers += Math.floor(Math.random() * 5) + 1;
            document.getElementById("playerCount").innerText = "Simulasi: " + totalPlayers + " Pemain Aktif";
            
            updateLeaderboard();
            
            // Reset Game
            level = 0; seconds = 0; player = { x: 1, y: 1 };
            startStopwatch();
            document.getElementById("levelText").innerText = "LEVEL 1";
        }
    }
    draw();
}

window.addEventListener("keydown", e => {
    if(e.key === "ArrowUp") move(0, -1);
    if(e.key === "ArrowDown") move(0, 1);
    if(e.key === "ArrowLeft") move(-1, 0);
    if(e.key === "ArrowRight") move(1, 0);
});

cat.onload = () => { 
    draw(); 
    startStopwatch(); 
    updateLeaderboard(); // Cek rekor saat buka game
};
</script>
</body>
</html>
