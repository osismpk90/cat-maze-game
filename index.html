<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Maze School</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:url("bg-sekolah.jpg") center/cover no-repeat;
color:white;
text-align:center;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
top:0;
left:0;
}

.content{
position:relative;
z-index:1;
}

.screen{display:none;}
.active{display:block;}

.logo img{
width:60px;
margin:5px;
}

h1{
color:#38bdf8;
text-shadow:0 0 10px #38bdf8;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:none;
}

/* BUTTON */
button{
padding:10px 15px;
border-radius:10px;
border:none;
background:#38bdf8;
cursor:pointer;
margin:5px;
}

/* INFO */
.info{
border:2px solid #38bdf8;
padding:8px 15px;
border-radius:20px;
display:inline-block;
margin:10px;
}

/* MAZE */
canvas{
background:#1e293b;
border-radius:10px;
margin-top:10px;
}

/* LEADERBOARD */
.leaderboard{
background:#1e293b;
padding:10px;
border-radius:10px;
max-width:300px;
margin:10px auto;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="content">

<!-- START -->
<div id="start" class="screen active">
<div class="logo">
<img src="logo-sekolah.png">
<img src="logo-mpk.png">
<img src="logo-osis.png">
</div>

<h1>CAT MAZE SCHOOL</h1>

<p>Masukkan nama anda</p>
<input id="nama">
<br>
<button onclick="startGame()">Mulai</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="logo">
<img src="logo-sekolah.png">
<img src="logo-mpk.png">
<img src="logo-osis.png">
</div>

<h1>CAT MAZE SCHOOL</h1>

<div class="leaderboard">
<b>🏆 Leaderboard</b>
<div id="list"></div>
</div>

<div class="info">
⏱ <span id="time">00:00</span>
</div>

<br>

<canvas id="maze" width="350" height="350"></canvas>

<br>

<button onclick="move(0,-1)">▲</button><br>
<button onclick="move(-1,0)">◀</button>
<button onclick="move(1,0)">▶</button><br>
<button onclick="move(0,1)">▼</button>

</div>

<!-- FINISH -->
<div id="finish" class="screen">
<h1>🎉 SELAMAT!</h1>
<p id="hasil"></p>
<p>Terima kasih sudah bermain 🙏</p>
<button onclick="ulang()">Main Lagi</button>
</div>

</div>

const goal={x:12,y:11};

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function startGame(){
let nama=document.getElementById("nama").value;
if(!nama){ alert("Isi nama dulu!"); return; }

show("game");
startTimer();
draw();
loadLeaderboard();
}

function formatTime(s){
let m=Math.floor(s/60);
let ss=s%60;
return (m<10?"0"+m:m)+":"+(ss<10?"0"+ss:ss);
}

function startTimer(){
timer=setInterval(()=>{
waktu++;
document.getElementById("time").innerText=formatTime(waktu);
},1000);
}

function draw(){
ctx.clearRect(0,0,350,350);

for(let y=0;y<maze.length;y++){
for(let x=0;x<maze[y].length;x++){
ctx.fillStyle = maze[y][x]==1?"#e5e7eb":"#0f172a";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
}

ctx.fillStyle="green";
ctx.fillRect(goal.x*tile,goal.y*tile,tile,tile);

if(cat.complete){
ctx.drawImage(cat, player.x*tile-5, player.y*tile-5, 35,35);
}
}

function move(dx,dy){
let nx=player.x+dx;
let ny=player.y+dy;

if(maze[ny][nx]==1){
player.x=nx;
player.y=ny;
}

if(player.x==goal.x && player.y==goal.y){
clearInterval(timer);

let nama=document.getElementById("nama").value;
saveScore(nama,waktu);

document.getElementById("hasil").innerText =
nama+" selesai dalam "+formatTime(waktu);

show("finish");
}

draw();
}

function saveScore(nama,time){
let data=JSON.parse(localStorage.getItem("mazeScore"))||[];
data.push({nama,time});
data.sort((a,b)=>a.time-b.time);
data=data.slice(0,10);
localStorage.setItem("mazeScore",JSON.stringify(data));
}

function loadLeaderboard(){
let data=JSON.parse(localStorage.getItem("mazeScore"))||[];
let list=document.getElementById("list");
list.innerHTML="";
data.forEach((d,i)=>{
list.innerHTML+=`<div>#${i+1} ${d.nama} - ${formatTime(d.time)}</div>`;
});
}

function ulang(){
location.reload();
}
