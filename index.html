<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Maze School</title>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background: url("bg-sekolah.jpg") no-repeat center center;
    background-size: cover;
    color:white;
    text-align:center;
}

/* overlay biar ga terlalu terang */
body::before {
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    z-index:-1;
}

h2 {
    color:#38bdf8;
}

canvas {
    background:white;
    border:4px solid #38bdf8;
    border-radius:12px;
    margin-top:10px;
}

.controls { margin:10px; }
.btn { padding:10px; margin:5px; font-size:18px; }

.timer { margin:5px; }

.leaderboard {
    background:#1e293b;
    margin:10px auto;
    padding:10px;
    border-radius:10px;
    max-width:300px;
    display:none;
}

.record-item {
    display:flex;
    justify-content:space-between;
    font-size:14px;
    border-bottom:1px solid #334155;
    padding:3px;
}
</style>
</head>

<body>

<h2>🐱 CAT MAZE SCHOOL 🐱</h2>

<input id="playerName" placeholder="Nama">
<button onclick="toggleLeaderboard()">🏆</button>

<div class="timer" id="timerText">⏱ 00:00</div>

<canvas id="maze" width="350" height="325"></canvas>

<div class="controls">
<button class="btn" onclick="move(0,-1)">⬆</button><br>
<button class="btn" onclick="move(-1,0)">⬅</button>
<button class="btn" onclick="move(0,1)">⬇</button>
<button class="btn" onclick="move(1,0)">➡</button>
</div>

<div class="leaderboard" id="leaderboardBox">
<h3>🏆 Leaderboard</h3>
<div id="leaderboardList"></div>
</div>

];

const goals = levels.map(lvl => ({
    x: lvl[0].length - 2,
    y: lvl.length - 2
}));

function formatTime(s){
let m=Math.floor(s/60);
let ss=s%60;
return (m<10?"0"+m:m)+":"+(ss<10?"0"+ss:ss);
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
seconds++;
document.getElementById("timerText").innerText="⏱ "+formatTime(seconds);
},1000);
}

function draw(){
ctx.clearRect(0,0,350,325);

let maze = levels[level];

for(let y=0;y<maze.length;y++){
for(let x=0;x<maze[y].length;x++){
ctx.fillStyle = maze[y][x]==0 ? "#1e293b" : "#fff";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
}

/* GOAL */
let g = goals[level];
ctx.fillStyle="lime";
ctx.fillRect(g.x*tile,g.y*tile,tile,tile);

/* KUCING */
ctx.font="20px Arial";
ctx.fillText("🐱", player.x*tile+3, player.y*tile+20);
}

function move(dx,dy){
let maze = levels[level];
let nx = player.x+dx;
let ny = player.y+dy;

if(maze[ny] && maze[ny][nx]==1){
player.x=nx;
player.y=ny;
}

let g = goals[level];

if(player.x==g.x && player.y==g.y){

if(level < levels.length-1){
level++;
player={x:1,y:1};
alert("Level selesai!");
}else{
clearInterval(timer);

let name=document.getElementById("playerName").value || "Player";
saveScore(name,seconds);

alert("🎉 Tamat!\nWaktu: "+formatTime(seconds));

level=0;
seconds=0;
player={x:1,y:1};
startTimer();
}
}

draw();
}

/* LEADERBOARD */
function toggleLeaderboard(){
let box=document.getElementById("leaderboardBox");
box.style.display = box.style.display=="none"?"block":"none";
renderLeaderboard();
}

function saveScore(name,time){
let data = JSON.parse(localStorage.getItem("mazeScore")) || [];
data.push({name,time});
data.sort((a,b)=>a.time-b.time);
data=data.slice(0,10);
localStorage.setItem("mazeScore",JSON.stringify(data));
}

function renderLeaderboard(){
let data = JSON.parse(localStorage.getItem("mazeScore")) || [];
let list=document.getElementById("leaderboardList");
list.innerHTML="";

data.forEach((d,i)=>{
let div=document.createElement("div");
div.className="record-item";
div.innerHTML=`<span>#${i+1} ${d.name}</span><span>${formatTime(d.time)}</span>`;
list.appendChild(div);
});
}

window.addEventListener("keydown",e=>{
if(e.key=="ArrowUp")move(0,-1);
if(e.key=="ArrowDown")move(0,1);
if(e.key=="ArrowLeft")move(-1,0);
if(e.key=="ArrowRight")move(1,0);
});

draw();
startTimer();
</script>

</body>
</html>
